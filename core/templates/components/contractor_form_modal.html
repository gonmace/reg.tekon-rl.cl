<form id="contractorForm" class="space-y-4">
    {% csrf_token %}

    <div class="form-control">
        <label for="{{ form.name.id_for_label }}" class="label">
            <span class="label-text font-medium">{{ form.name.label }}</span>
            <span class="label-text-alt text-error">*</span>
        </label>
        {{ form.name }}
        {% if form.name.errors %}
            <div class="label">
                <span class="label-text-alt text-error">{{ form.name.errors|join:", " }}</span>
            </div>
        {% endif %}
    </div>

    <div class="form-control">
        <label for="{{ form.code.id_for_label }}" class="label">
            <span class="label-text font-medium">{{ form.code.label }}</span>
            <span class="label-text-alt text-error">*</span>
        </label>
        {{ form.code }}
        {% if form.code.errors %}
            <div class="label">
                <span class="label-text-alt text-error">{{ form.code.errors|join:", " }}</span>
            </div>
        {% endif %}
    </div>

    {% if form.is_active %}
    <div class="form-control">
        <label class="label cursor-pointer justify-start gap-3">
            {{ form.is_active }}
            <span class="label-text font-medium">{{ form.is_active.label }}</span>
        </label>
    </div>
    {% endif %}

    <div class="flex gap-2 justify-center mt-6">
        <button type="button" class="btn btn-cancel" onclick="closeContractorModal()">
            <i class="fa-solid fa-xmark mr-1"></i> Cancelar
        </button>
        <button type="submit" id="saveContractorBtn" class="btn btn-save flex-grow">
            <i class="fa-solid fa-check mr-1"></i> Guardar
        </button>
    </div>
</form>
