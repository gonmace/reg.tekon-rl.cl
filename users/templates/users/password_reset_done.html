{% extends "base_login.html" %}

{% block title %}Correo enviado{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>

    <p class="login-subtitle" style="color:var(--cp-text-hi);font-size:1rem;font-weight:600;">Correo enviado</p>

    <div class="login-info">
      Si existe una cuenta con ese correo, recibirás un enlace para restablecer tu contraseña en los próximos minutos.
    </div>

    <a href="{% url 'users:login' %}" class="login-footer">Volver al inicio de sesión</a>

  </div>
</div>
{% endblock %}
