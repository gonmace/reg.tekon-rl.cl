<div class="flex items-center justify-center gap-1">
  <button type="button"
          class="btn btn-sm btn-ghost btn-circle text-edit contractor-edit-btn"
          data-id="{{ record.id }}"
          data-nombre="{{ record.name }}"
          title="Editar contratista">
    <i class="fa-solid fa-pen-to-square"></i>
  </button>
  <button type="button"
          class="btn btn-sm btn-ghost btn-circle text-delete contractor-delete-btn"
          data-id="{{ record.id }}"
          data-nombre="{{ record.name }}"
          title="Eliminar contratista">
    <i class="fa-solid fa-trash"></i>
  </button>
</div>
