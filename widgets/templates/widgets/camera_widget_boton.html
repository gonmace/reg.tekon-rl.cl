{% comment %}
widgets/camera_widget_boton.html
{% endcomment %}
<a href="{{ widget.url }}"
   class="btn btn-{{ widget.color }} btn-circle sombra active:scale-95 transition-transform duration-100 relative"
   title="Fotos — {{ widget.count }}/{{ widget.min_count }}">
  <i class="fa-solid fa-camera text-xl"></i>
  {% if widget.count %}
    <span class="badge badge-xs absolute -top-2 -right-2 font-bold">{{ widget.count }}</span>
  {% endif %}
</a>
