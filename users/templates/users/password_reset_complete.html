{% extends "base_login.html" %}

{% block title %}Contraseña restablecida{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <p class="login-subtitle" style="color:var(--cp-text-hi);font-size:1rem;font-weight:600;">¡Contraseña actualizada!</p>

    <div class="login-info">
      Tu contraseña ha sido restablecida correctamente. Ya puedes iniciar sesión.
    </div>

    <a href="{% url 'users:login' %}" class="login-btn">Iniciar sesión</a>

  </div>
</div>
{% endblock %}
