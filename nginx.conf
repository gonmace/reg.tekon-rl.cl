# nginx.conf — reg.tekon-rl.cl
# Copiar a /etc/nginx/sites-available/reportestekon
# Activar: ln -s /etc/nginx/sites-available/reportestekon /etc/nginx/sites-enabled/

upstream django {
    server 127.0.0.1:8001;
    keepalive 32;
}

# ── Redirigir HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name reg.tekon-rl.cl;

    # Permitir verificación Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name reg.tekon-rl.cl;

    # ── SSL (gestionado por Certbot) ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/reg.tekon-rl.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reg.tekon-rl.cl/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Seguridad ─────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── Tamaño máximo de subida (fotos + mapas) ───────────────────────────────
    client_max_body_size 50M;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml;

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/reportestekon_access.log;
    error_log  /var/log/nginx/reportestekon_error.log warn;

    # ── Archivos estáticos ────────────────────────────────────────────────────
    location /static/ {
        alias   /home/pti/reportesTekon/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Archivos media ────────────────────────────────────────────────────────
    location /media/ {
        alias   /home/pti/reportesTekon/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location = /health/ {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /favicon.ico {
        alias   /home/pti/reportesTekon/staticfiles/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # ── Proxy → Gunicorn ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://django;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        # Timeouts generosos para generación de PDFs (WeasyPrint puede tardar)
        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Buffers
        proxy_buffering          on;
        proxy_buffer_size        8k;
        proxy_buffers           16 8k;
        proxy_busy_buffers_size 16k;
    }
}
