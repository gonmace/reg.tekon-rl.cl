{% load access_tags %}
<div class="flex items-center justify-center gap-1">
  {% supermanager_only %}
  <button type="button"
          class="btn btn-sm btn-ghost btn-circle text-edit site-edit-btn"
          data-id="{{ record.id }}"
          data-nombre="{{ record.name }}"
          title="Editar sitio">
    <i class="fa-solid fa-pen-to-square"></i>
  </button>
  <button type="button"
          class="btn btn-sm btn-ghost btn-circle text-delete site-delete-btn"
          data-id="{{ record.id }}"
          data-nombre="{{ record.name }}"
          title="Eliminar sitio">
    <i class="fa-solid fa-trash"></i>
  </button>
  {% endsupermanager_only %}
</div>
