<div class="flex items-center justify-center gap-1">
  <span class="reg-txtss-row-id" data-id="{{ record.id }}" style="display:none;"></span>
  {% if record.concluido %}
  <a href="{% url 'reg_txtss:pdf' registro_id=record.id %}" target="_blank"
     class="btn btn-sm btn-ghost btn-circle text-error" title="Generar PDF">
    <i class="fa-solid fa-file-pdf"></i>
  </a>
  {% endif %}
  {% if request.user.is_ito_like or not request.user.is_limited %}
  <button type="button"
          class="btn btn-sm btn-ghost btn-circle text-info reg-txtss-copy-btn"
          data-id="{{ record.id }}"
          data-alternativa="{{ record.alternativa }}"
          title="Copiar con siguiente alternativa">
    <i class="fa-solid fa-copy"></i>
  </button>
  {% endif %}
  {% if not request.user.is_limited %}
  <button type="button"
          class="btn btn-sm btn-ghost btn-circle text-edit reg-txtss-edit-btn"
          data-id="{{ record.id }}"
          title="Editar registro">
    <i class="fa-solid fa-pen-to-square"></i>
  </button>
  <button type="button"
          class="btn btn-sm btn-ghost btn-circle text-delete reg-txtss-delete-btn"
          data-id="{{ record.id }}"
          data-nombre="{{ record.sitio.name }}"
          title="Eliminar registro">
    <i class="fa-solid fa-trash"></i>
  </button>
  {% endif %}
  {% if request.user.is_superuser and record.has_widgets and not record.concluido %}
  <button type="button"
          class="btn btn-sm btn-ghost btn-circle text-error reg-txtss-formatear-btn"
          data-id="{{ record.id }}"
          data-nombre="{{ record.sitio.name }}"
          data-url="{% url 'reg_txtss:api_formatear' registro_id=record.id %}"
          data-resumen-url="{% url 'reg_txtss:api_resumen_formatear' registro_id=record.id %}"
          title="Formatear todos los datos">
    <i class="fa-solid fa-eraser"></i>
  </button>
  {% endif %}
</div>
